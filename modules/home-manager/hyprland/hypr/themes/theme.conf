source = colors.conf

general {
    gaps_in = 4
    gaps_out = 4
    border_size = 2
    col.active_border = $primary_fixed_dim
    col.inactive_border = $outline_variant
    layout = dwindle
    resize_on_border = true
}

group {
}

decoration {
    rounding = 16
 
    blur {
        enabled = yes
        passes = 2
        new_optimizations = on
        ignore_opacity = on
        xray = false
    }
}

